name: Build and Release RBF

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CORE_NAME: SNES
      DOCKER_IMAGE: theypsilon/quartus-lite-c5:17.0.2.docker0
      COMPILATION_COMMAND: /opt/intelFPGA_lite/quartus/bin/quartus_sh --flow compile SNES.qpf
      COMPILATION_OUTPUT: output_files/SNES.rbf

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set release variables
        run: |
          echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo "RELEASE_FILE=${CORE_NAME}_${GITHUB_REF_NAME}.rbf" >> $GITHUB_ENV

      - name: Create Dockerfile
        run: |
          cat > Dockerfile <<EOF
          FROM ${DOCKER_IMAGE}
          WORKDIR /project
          COPY . .
          RUN ${COMPILATION_COMMAND}
          EOF

      - name: Build project
        run: docker build -t quartus-build .

      - name: Extract RBF
        run: |
          CONTAINER_ID=$(docker create quartus-build)
          docker cp "${CONTAINER_ID}:/project/${COMPILATION_OUTPUT}" "${RELEASE_FILE}"
          docker rm "${CONTAINER_ID}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.RELEASE_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}